{% extends "smart_home/base.html" %}

{% block content %}
<div class="min-h-[75vh] flex items-center justify-center">
    <div class="w-full max-w-md">

        <!-- ── Auth Card ── -->
        <div class="auth-card">
            <!-- Logo & Başlık -->
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-gradient-to-br from-accent to-success mb-4 shadow-lg shadow-accent/20">
                    <i class="fas fa-bolt text-white text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold mb-1">Tekrar Hoş Geldin</h1>
                <p class="text-gray-500 text-sm">Sparkle hesabınla giriş yap</p>
            </div>

            <!-- Hata Mesajları -->
            {% if error %}
            <div
                class="mb-6 p-3 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm flex items-center gap-2">
                <i class="fas fa-exclamation-circle"></i>
                <span>{{ error }}</span>
            </div>
            {% endif %}

            <!-- Form -->
            <form method="post" class="space-y-5">
                {% csrf_token %}

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Kullanıcı
                        Adı</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-user auth-input-icon"></i>
                        <input type="text" name="username" required autofocus class="auth-input"
                            placeholder="kullanici_adi" value="{{ username|default:'' }}">
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-2 uppercase tracking-wider">Şifre</label>
                    <div class="auth-input-wrapper">
                        <i class="fas fa-lock auth-input-icon"></i>
                        <input type="password" name="password" required class="auth-input" placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" class="auth-btn">
                    <i class="fas fa-sign-in-alt mr-2"></i>Giriş Yap
                </button>
            </form>

            <!-- Alt Link -->
            <div class="mt-8 text-center">
                <p class="text-gray-500 text-sm">
                    Hesabın yok mu?
                    <a href="{% url 'smart_home:register' %}"
                        class="text-accent-light font-medium hover:text-accent transition-colors">
                        Kayıt Ol
                    </a>
                </p>
            </div>

            <!-- Yönetici Girişi -->
            <div class="mt-4 pt-4 border-t border-white/5 text-center">
                <a href="/admin/"
                    class="inline-flex items-center gap-2 text-gray-600 text-xs hover:text-gray-400 transition-colors">
                    <i class="fas fa-shield-alt"></i>
                    Yönetici Paneli
                </a>
            </div>
        </div>

    </div>
</div>
{% endblock %}
